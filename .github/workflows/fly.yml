name: Fly Deploy
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".agents/**"
      - ".github/**"
permissions: read-all
jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v7
      - name: 🚀 Deploy Production
        uses: superfly/flyctl-actions@1.6
        with:
          args: deploy --no-cache --remote-only --build-secret GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
